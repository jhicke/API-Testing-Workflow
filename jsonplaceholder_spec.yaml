openapi: "3.0.0"
info:
  title: JSONPlaceholder API
  version: "1.0.0"
  description: Fake REST API for testing and prototyping

servers:
  - url: https://jsonplaceholder.typicode.com

paths:
  /todos:
    get:
      operationId: listTodos
      summary: Get all todos
      tags: [todos]
      responses:
        "200":
          description: Array of all todos

  /todos/{id}:
    x-test-ids:
      valid: 1
      invalid: 99999
    get:
      operationId: getTodo
      summary: Get a single todo by ID
      tags: [todos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A todo
        "404":
          description: Todo not found

components:
  schemas:
    Todo:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        completed:
          type: boolean

